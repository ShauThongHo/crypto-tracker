name: Render Keep Alive

on:
  schedule:
    # 这里的 cron 表达式表示：每 10 分钟执行一次
    - cron: '*/10 * * * *'
  workflow_dispatch: # 允许你手动点击按钮测试

jobs:
  ping_render:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Check Endpoint
        run: |
          # 替换成你真实的渲染路径
          curl -s https://crypto-tracker-4pa1.onrender.com/health-check
          echo "Ping executed at $(date)"